<!DOCTYPE html>
<!--
  cuemath.com/maths/{exam}/[{band}/]
  Test-prep exam landing page — chapter list (chapter -> block -> worksheet)
  Same visual pattern as maths-grade-3.html's hover-expand chapter rows.
  Data + URLs are a PROPOSAL — see testprep-data.js and the
  "Test Prep URL Structure — DRAFT for DK discussion" Google Sheet.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Prep — Cuemath</title>
<style>
@font-face{font-family:'Athletics';src:url('fonts/Athletics-Bold.woff2') format('woff2');font-weight:700}
@font-face{font-family:'Athletics';src:url('fonts/Athletics-Regular.woff2') format('woff2');font-weight:400}
@font-face{font-family:'UntitledSans';src:url('fonts/UntitledSans-Regular.woff2') format('woff2');font-weight:400}
@font-face{font-family:'UntitledSans';src:url('fonts/UntitledSans-Medium.woff2') format('woff2');font-weight:500}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'UntitledSans',-apple-system,system-ui,sans-serif;font-weight:400;font-size:15px;line-height:1.5;color:#1C1917;background:#F5F0E8}
.shell{display:grid;grid-template-columns:64px 1fr 260px;height:100vh;overflow:hidden}
/* LEFT NAV */
.leftnav{background:#1C1917;display:flex;flex-direction:column;align-items:center;padding:12px 0;z-index:10}
.ln-avatar{width:40px;height:40px;border-radius:50%;background:#E8995A;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:24px;flex-shrink:0}
.ln-items{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.ln-item{width:48px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;border-radius:10px}
.ln-item:hover{background:rgba(255,255,255,.08)}
.ln-item.active{background:rgba(255,255,255,.1)}
.ln-icon svg{width:22px;height:22px;opacity:.45}
.ln-item.active .ln-icon svg,.ln-item:hover .ln-icon svg{opacity:.9}
.ln-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4)}
.ln-item.active .ln-label,.ln-item:hover .ln-label{color:rgba(255,255,255,.8)}
.ln-logo{margin-top:auto;margin-bottom:8px;font-family:'Athletics';font-size:8px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.12em;text-transform:uppercase}
/* MAIN */
.main{overflow-y:auto;display:flex;flex-direction:column;min-height:0;background:#F5F0E8}
.topbar{background:#F5F0E8;border-bottom:1px solid rgba(0,0,0,.08);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:5}
.topbar-bc{font-size:13px;color:#97948E;display:flex;align-items:center;gap:6px}
.topbar-bc a{color:#97948E;text-decoration:none}
.topbar-bc a:hover{color:#1C1917}
.topbar-bc .cur{color:#1C1917;font-weight:500}
.grade-wrap{padding:20px 24px;flex:1}
/* Band switcher — same visual as grade-switcher on maths-grade-3.html */
.grade-switcher{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.grade-switcher::-webkit-scrollbar{display:none}
.gs-pill{padding:5px 14px;border:1px solid rgba(0,0,0,.12);background:none;font-family:'UntitledSans';font-size:12px;font-weight:500;color:#97948E;cursor:pointer;border-radius:20px;white-space:nowrap;flex-shrink:0}
.gs-pill:hover{border-color:#1C1917;color:#1C1917}
.gs-pill.active{background:#1C1917;color:#fff;border-color:#1C1917}
/* Exam header */
.grade-section-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.grade-section-title{font-family:'Athletics';font-size:17px;font-weight:700;color:#1C1917}
.grade-section-pct{font-size:12px;color:#97948E;margin-left:auto}
.mastery-track{height:3px;background:#E5DDD4;margin-bottom:20px}
.mastery-fill{height:100%;background:#1C1917;width:0}

/* Chapter list — full-width rows, hover-expand in normal flow (same pattern as maths-grade-3.html) */
.chapter-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.ch-row{background:#fff;border:1px solid rgba(0,0,0,.07);transition:box-shadow .12s}
.ch-row:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.ch-row-header{display:flex;align-items:center;gap:14px;padding:13px 16px}
.ch-row-num{font-size:12px;font-weight:600;color:#97948E;width:18px;flex-shrink:0}
.ch-row-icon{width:38px;height:38px;border-radius:9px;background:#F5F0E8;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ch-row-name{font-family:'Athletics';font-size:14px;font-weight:700;color:#1C1917;flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.ch-row-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-row-count{font-size:11px;color:#97948E;white-space:nowrap}
.ch-row-chevron{font-size:11px;color:#97948E;transition:transform .15s ease;flex-shrink:0}
.ch-row:hover .ch-row-chevron{transform:rotate(180deg);color:#1C1917}
.ch-row-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease}
.ch-row:hover .ch-row-body{grid-template-rows:1fr}
.ch-row-body-inner{overflow:hidden}
.ch-row-lessons{display:grid;grid-template-columns:1fr;gap:2px 12px;padding:2px 16px 14px 68px;border-top:1px solid #F5F0E8;margin-top:2px}
.ch-row-lessons a{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:6px 8px;font-size:12px;color:#1C1917;text-decoration:none;border-radius:4px;line-height:1.35}
.ch-row-lessons a:hover{background:#FAF1E6;color:#CE7E12}
.ch-row-lessons a .block-tag{font-size:10px;color:#B0AAA5;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.ch-row-lessons a:hover .block-tag{color:#CE7E12}
.about-topic{border-radius:4px;cursor:pointer}
.about-topic:hover{background:#FAF1E6}
.about-topic-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:6px 8px;font-size:12px;color:#1C1917;line-height:1.35}
.about-topic-caret{font-size:9px;color:#B0AAA5;transition:transform .15s ease;flex-shrink:0}
.about-topic.open .about-topic-caret{transform:rotate(180deg)}
.about-topic-body{display:none;padding:2px 8px 14px 8px}
.about-topic.open .about-topic-body{display:block}
.about-topic-body p{font-size:12.5px;color:#57534E;line-height:1.6;margin-bottom:10px}
.about-faq-item{margin-bottom:10px}
.about-faq-q{font-size:12.5px;font-weight:700;color:#1C1917;margin-bottom:3px}
.about-faq-a{font-size:12.5px;color:#57534E;line-height:1.6}
.ch-row-lessons .block-locked{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:6px 8px;font-size:12px;color:#B0AAA5;line-height:1.35}
.ch-row-lessons .block-signin-btn{background:none;border:1px solid #F4AB52;color:#CE7E12;font-family:'UntitledSans';font-size:10px;font-weight:600;padding:3px 8px;cursor:pointer;flex-shrink:0;white-space:nowrap}
.ch-row-lessons .block-signin-btn:hover{background:#F4AB52;color:#1C1917}

/* App download CTA — same component as maths.html */
.app-download-strip{background:#1C1917;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.app-dl-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.app-dl-icon{font-size:24px;flex-shrink:0}
.app-dl-title{font-family:'Athletics';font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.app-dl-sub{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4}
.app-dl-btns{display:flex;gap:8px;flex-shrink:0}
.app-dl-btn{display:flex;align-items:center;gap:5px;background:#F4AB52;color:#1C1917;padding:7px 14px;font-family:'UntitledSans';font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap}
.app-dl-btn:hover{background:#CE7E12;color:#fff}

/* RIGHT PANEL */
.rightpanel{background:#F5F0E8;border-left:1px solid rgba(0,0,0,.08);overflow-y:auto}
.rp-inner{padding:14px;display:flex;flex-direction:column;gap:10px}
.rp-stats-row{display:flex;background:#fff;border:1px solid rgba(0,0,0,.07)}
.rp-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;border-right:1px solid rgba(0,0,0,.06)}
.rp-stat:last-child{border-right:none}
.rp-stat-icon{width:30px;height:30px;border-radius:50%;background:#F5F0E8;display:flex;align-items:center;justify-content:center}
.rp-stat-icon svg{width:15px;height:15px}
.rp-stat-points{color:#7C3AED}
.rp-stat-streak{color:#16A34A}
.rp-stat-sparks{color:#E89040}
.rp-stat-label{font-size:9px;color:#97948E;text-transform:uppercase;letter-spacing:.05em}
.rp-stat-value{font-family:'Athletics';font-size:14px;font-weight:700;color:#1C1917}
.rp-divider{height:1px;background:rgba(0,0,0,.07)}
.rp-exam-nav{background:#fff;border:1px solid rgba(0,0,0,.07)}
.ren-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#97948E;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.07)}
.ren-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(0,0,0,.05);font-size:12px;color:#97948E;cursor:pointer;text-decoration:none}
.ren-item:hover{background:#FAF1E6;color:#1C1917}
.ren-item.active{color:#1C1917;font-weight:500;background:#FEF3E2}
.ren-item:last-child{border-bottom:none}
.rp-cta-inner{background:linear-gradient(135deg,#EC9A32 0%,#F6BE7C 50%,#D994F8 100%);padding:16px}
.rp-cta-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#7E4800;margin-bottom:5px;display:block}
.rp-cta-title{font-family:'Athletics';font-size:15px;font-weight:700;color:#292827;margin-bottom:4px;line-height:1.3}
.rp-cta-sub{font-size:11px;color:#5B4100;margin-bottom:12px;line-height:1.5}
.rp-cta-btn{background:#1C1917;color:#fff;border:none;padding:9px;font-family:'UntitledSans';font-size:12px;font-weight:500;cursor:pointer;width:100%}
.rp-cta-appbtns{display:flex;flex-direction:column;gap:6px}
.rp-cta-appbtn{display:flex;align-items:center;justify-content:center;gap:6px;background:#1C1917;color:#fff;border:none;padding:9px;font-family:'UntitledSans';font-size:12px;font-weight:500;cursor:pointer;text-decoration:none}
.rp-cta-appbtn:hover{background:#333;color:#fff}
@media(max-width:768px){
  html,body{height:auto;overflow:visible}
  .shell{display:block;height:auto}
  .leftnav{display:none}
  .main{overflow-y:visible}
  .rightpanel{overflow-y:visible;border-left:none;border-top:1px solid rgba(0,0,0,.08)}
}
@media(max-width:480px){
  .grade-wrap{padding:14px}
  .grade-section-header{flex-wrap:wrap;gap:6px}
  .ch-row-header{flex-wrap:wrap;gap:8px 10px}
  .ch-row-meta{order:3;width:100%;padding-left:52px}
  .ch-row-lessons{padding-left:16px}
  .rp-inner{padding:12px}
}
</style>
</head>

<!-- Points/Streaks/Sparks — see gamification.js. Read-only display on this
     page (no lesson/practice actions happen here). -->
<script src="gamification.js"></script>
<script src="testprep-data.js"></script>
<script src="testprep-about-content.js"></script>
<script>
// testPrepData comes from testprep-data.js (proposal — see the DRAFT sheet linked there)

const params = new URLSearchParams(location.search);
const examSlug = params.get('exam') || 'kangaroo';
const exam = testPrepData[examSlug];

let currentBandIdx = 0;
const initBandSlug = params.get('band');
if (exam && initBandSlug) {
  const idx = exam.bands.findIndex(b => b.slug === initBandSlug);
  if (idx !== -1) currentBandIdx = idx;
}

// Right panel — jump to any other exam
const renEl = document.getElementById('rp-exam-nav');
Object.keys(testPrepData).forEach(slug => {
  const item = document.createElement('a');
  item.className = 'ren-item' + (slug === examSlug ? ' active' : '');
  item.href = 'maths-testprep-exam.html?exam=' + slug;
  item.textContent = testPrepData[slug].name;
  renEl.appendChild(item);
});

function chapterIcon(chapter) {
  const hasTest = chapter.blocks.some(b => b.type === 'TESTS');
  return hasTest ? '🧪' : '📄';
}

// ── One-free-then-sign-in gating (test-prep pool — separate from curriculum's
// cuemathGlobalCompletedLesson; same mechanic, different counter — see report).
// Everything starts open, everywhere. The first worksheet a free user opens
// (any exam, any block — recorded by maths-testprep-worksheet.html on load)
// becomes the one open/reviewable block site-wide; every other block, in
// every exam, then locks behind sign-in — exactly like the curriculum chapter
// page's getState().
const TESTPREP_GLOBAL_KEY = 'cuemathGlobalCompletedTestPrepWorksheet';
// Shared with curriculum — signing in anywhere unlocks both areas at once.
let isSignedIn = sessionStorage.getItem('cuemathSignedIn') === '1';

function getGlobalTestPrepCompleted() {
  const raw = sessionStorage.getItem(TESTPREP_GLOBAL_KEY);
  return raw ? JSON.parse(raw) : null;
}

function getBlockState(chapterName, blockName) {
  const claim = getGlobalTestPrepCompleted();
  if (claim && claim.exam === examSlug && claim.chapter === chapterName && claim.block === blockName) return 'done';
  if (isSignedIn) return 'open';
  if (claim === null) return 'open'; // nobody's opened a worksheet anywhere yet
  return 'locked';
}

// "About {Exam}" unit — DK's proposal, modeled on Khan Academy's SAT Math page
// (khanacademy.org/test-prep/v2-sat-math), whose actual Unit 1 is "About the
// SAT suite of assessments and how to use this course" — an informational
// unit embedded in the same course page, not a separate article section. The
// idea: fold SEO/informational content about the exam into Unit 1 of this
// same page so it inherits the practice page's authority instead of living
// on a weaker standalone page.
// Real content, researched and verified per exam (2026-07-10) — see
// testprep-about-content.js, keyed by the same lowercase slug as examSlug
// (the global declared near the top of this script). Falls back to the
// original inert TBD placeholder if a slug isn't in that file yet (shouldn't
// happen today — all 12 current exams are covered — but keeps this page from
// breaking if a 13th exam is added before its About content is written).
function renderAboutUnit(examName) {
  const content = (typeof testprepAboutContent !== 'undefined') ? testprepAboutContent[examSlug] : null;
  if (!content) {
    const existingFaqSchema = document.getElementById('faq-schema-ld');
    if (existingFaqSchema) existingFaqSchema.remove();
    const topics = [
      `What is ${examName}?`,
      `${examName} format and scoring`,
      `How to prepare for ${examName}`,
      `${examName} FAQs`
    ];
    const links = topics.map(t =>
      `<div class="block-locked" style="color:#B0AAA5" title="Placeholder — pending SEO research">${t}<span class="block-tag">TBD</span></div>`
    ).join('');
    return `
      <div class="ch-row" id="ch-about">
        <div class="ch-row-header">
          <span class="ch-row-num">1</span>
          <span class="ch-row-icon">📰</span>
          <span class="ch-row-name">About ${examName} <span style="font-weight:400;color:#B0AAA5;font-size:11px;text-transform:none">— placeholder, pending research</span></span>
          <span class="ch-row-meta">
            <span class="ch-row-count">${topics.length} articles</span>
          </span>
          <span class="ch-row-chevron">⌄</span>
        </div>
        <div class="ch-row-body">
          <div class="ch-row-body-inner">
            <div class="ch-row-lessons">${links}</div>
          </div>
        </div>
      </div>`;
  }

  const topics = [
    {title: `What is ${examName}?`, body: `<p>${content.whatIs}</p>`},
    {title: `${examName} format and scoring`, body: `<p>${content.formatScoring}</p>`},
    {title: `How to prepare for ${examName}`, body: `<p>${content.howToPrepare}</p>`},
    {title: `${examName} FAQs`, body: content.faqs.map(f =>
      `<div class="about-faq-item"><div class="about-faq-q">${f.q}</div><div class="about-faq-a">${f.a}</div></div>`
    ).join('')},
  ];

  // FAQPage schema — mirrors the homepage's renderFaqs() pattern. Keyed by
  // a stable id so switching bands (which re-runs renderAboutUnit) replaces
  // the existing tag instead of stacking duplicate schema blocks.
  const existingFaqSchema = document.getElementById('faq-schema-ld');
  if (existingFaqSchema) existingFaqSchema.remove();
  const faqLdJson = {
    '@context': 'https://schema.org',
    '@type': 'FAQPage',
    mainEntity: content.faqs.map(f => ({
      '@type': 'Question',
      name: f.q,
      acceptedAnswer: {'@type': 'Answer', text: f.a},
    })),
  };
  const faqSchemaScript = document.createElement('script');
  faqSchemaScript.id = 'faq-schema-ld';
  faqSchemaScript.type = 'application/ld+json';
  faqSchemaScript.textContent = JSON.stringify(faqLdJson);
  document.head.appendChild(faqSchemaScript);
  const items = topics.map((t, i) => `
    <div class="about-topic" id="about-topic-${i}" onclick="toggleAboutTopic(${i})">
      <div class="about-topic-head">${t.title}<span class="about-topic-caret">⌄</span></div>
      <div class="about-topic-body">${t.body}</div>
    </div>`
  ).join('');
  return `
    <div class="ch-row" id="ch-about">
      <div class="ch-row-header">
        <span class="ch-row-num">1</span>
        <span class="ch-row-icon">📰</span>
        <span class="ch-row-name">About ${examName}</span>
        <span class="ch-row-meta">
          <span class="ch-row-count">${topics.length} articles</span>
        </span>
        <span class="ch-row-chevron">⌄</span>
      </div>
      <div class="ch-row-body">
        <div class="ch-row-body-inner">
          <div class="ch-row-lessons">${items}</div>
        </div>
      </div>
    </div>`;
}

function toggleAboutTopic(i) {
  document.getElementById('about-topic-' + i).classList.toggle('open');
}

function loadBand(idx) {
  currentBandIdx = idx;
  const band = exam.bands[idx];
  document.querySelectorAll('.gs-pill').forEach(p => p.classList.toggle('active', +p.dataset.idx === idx));

  const chapters = band.chapters;
  const totalBlocks = chapters.reduce((sum, c) => sum + c.blocks.length, 0);
  document.getElementById('exam-count').textContent = `${chapters.length} chapters · ${totalBlocks} practice goals`;

  const list = document.getElementById('chapter-list');
  list.innerHTML = renderAboutUnit(exam.name) + chapters.map((ch, i) => {
    const blockLinks = ch.blocks.map(block => {
      const wsCount = block.worksheets.length;
      const tag = block.type === 'TESTS' ? 'Mock test' : (wsCount > 1 ? wsCount + ' parts' : 'Practice');
      const state = getBlockState(ch.name, block.name);
      if (state === 'locked') {
        return `<div class="block-locked">${block.name}<a class="block-signin-btn" href="https://student.cuemath.com/" onclick="event.stopPropagation()">Sign Up</a></div>`;
      }
      const doneTag = state === 'done' ? 'Reviewed' : tag;
      const href = `maths-testprep-worksheet.html?exam=${examSlug}&chapter=${encodeURIComponent(ch.name)}&block=${encodeURIComponent(block.name)}`;
      return `<a href="${href}" onclick="event.stopPropagation()">${block.name}<span class="block-tag">${doneTag}</span></a>`;
    }).join('');
    return `
    <div class="ch-row" id="ch-${i+2}">
      <div class="ch-row-header">
        <span class="ch-row-num">${i+2}</span>
        <span class="ch-row-icon">${chapterIcon(ch)}</span>
        <span class="ch-row-name">${ch.name}</span>
        <span class="ch-row-meta">
          <span class="ch-row-count">${ch.blocks.length} goal${ch.blocks.length===1?'':'s'}</span>
        </span>
        <span class="ch-row-chevron">⌄</span>
      </div>
      <div class="ch-row-body">
        <div class="ch-row-body-inner">
          <div class="ch-row-lessons">${blockLinks}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function init() {
  if (!exam) {
    document.getElementById('exam-title').textContent = 'Exam not found';
    document.getElementById('chapter-list').innerHTML = '';
    return;
  }
  document.getElementById('bc-exam-label').textContent = exam.name;
  document.getElementById('exam-title').textContent = exam.name;
  document.title = exam.name + ' Test Prep — Cuemath';

  const switcher = document.getElementById('band-switcher');
  if (exam.hasBands && exam.bands.length > 1) {
    switcher.style.display = 'flex';
    switcher.innerHTML = exam.bands.map((b, i) =>
      `<button class="gs-pill${i===currentBandIdx?' active':''}" data-idx="${i}" onclick="loadBand(${i})">${b.label}</button>`
    ).join('');
  } else {
    switcher.style.display = 'none';
  }

  loadBand(currentBandIdx);
}

init();
</script>
</body>
</html>
