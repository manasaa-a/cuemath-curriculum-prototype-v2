<!DOCTYPE html>
<!--
  cuemath.com/maths/3-grade/
  The standalone chapter page (maths-grade-3-chapter.html) is retired from
  this flow: each chapter row here expands (click, one open at a time —
  opening the next chapter closes whichever was open) directly into the full
  lesson list with real Start/Resume/Review/lock state, mastery indicators,
  "Mark as Complete", and the lesson-preview + sign-in modals — everything
  the chapter page used to do. Clicking Start/Resume/Review goes straight to
  the lesson page. maths-grade-3-chapter.html itself is left in place but is
  no longer linked to from here.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 3 Math — Cuemath</title>
<style>
@font-face{font-family:'Athletics';src:url('fonts/Athletics-Bold.woff2') format('woff2');font-weight:700}
@font-face{font-family:'Athletics';src:url('fonts/Athletics-Regular.woff2') format('woff2');font-weight:400}
@font-face{font-family:'UntitledSans';src:url('fonts/UntitledSans-Regular.woff2') format('woff2');font-weight:400}
@font-face{font-family:'UntitledSans';src:url('fonts/UntitledSans-Medium.woff2') format('woff2');font-weight:500}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'UntitledSans',-apple-system,system-ui,sans-serif;font-weight:400;font-size:15px;line-height:1.5;color:#1C1917;background:#F5F0E8}
.shell{display:grid;grid-template-columns:64px 1fr 260px;height:100vh;overflow:hidden}
/* LEFT NAV */
.leftnav{background:#1C1917;display:flex;flex-direction:column;align-items:center;padding:12px 0;z-index:10}
.ln-avatar{width:40px;height:40px;border-radius:50%;background:#E8995A;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:24px;flex-shrink:0}
.ln-items{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.ln-item{width:48px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;border-radius:10px}
.ln-item:hover{background:rgba(255,255,255,.08)}
.ln-item.active{background:rgba(255,255,255,.1)}
.ln-icon svg{width:22px;height:22px;opacity:.45}
.ln-item.active .ln-icon svg,.ln-item:hover .ln-icon svg{opacity:.9}
.ln-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4)}
.ln-item.active .ln-label,.ln-item:hover .ln-label{color:rgba(255,255,255,.8)}
.ln-logo{margin-top:auto;margin-bottom:8px;font-family:'Athletics';font-size:8px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.12em;text-transform:uppercase}
/* MAIN */
.main{overflow-y:auto;display:flex;flex-direction:column;min-height:0;background:#F5F0E8}
.topbar{background:#F5F0E8;border-bottom:1px solid rgba(0,0,0,.08);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:5}
.topbar-bc{font-size:13px;color:#97948E;display:flex;align-items:center;gap:6px}
.topbar-bc a{color:#97948E;text-decoration:none}
.topbar-bc a:hover{color:#1C1917}
.topbar-bc .cur{color:#1C1917;font-weight:500}
.tb-btn{background:#F4AB52;color:#1C1917;border:none;padding:7px 16px;font-family:'UntitledSans';font-size:13px;font-weight:500;cursor:pointer}
.tb-btn:hover{background:#CE7E12}
.grade-wrap{padding:20px 24px;flex:1}
/* Grade switcher */
.grade-switcher{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.grade-switcher::-webkit-scrollbar{display:none}
.gs-pill{padding:5px 14px;border:1px solid rgba(0,0,0,.12);background:none;font-family:'UntitledSans';font-size:12px;font-weight:500;color:#97948E;cursor:pointer;border-radius:20px;white-space:nowrap;flex-shrink:0}
.gs-pill:hover{border-color:#1C1917;color:#1C1917}
.gs-pill.active{background:#1C1917;color:#fff;border-color:#1C1917}
/* Grade header */
.grade-section-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.grade-section-title{font-family:'Athletics';font-size:17px;font-weight:700;color:#1C1917}
.grade-section-pct{font-size:12px;color:#97948E;margin-left:auto}
.mastery-track{height:3px;background:#E5DDD4;margin-bottom:20px}
.mastery-fill{height:100%;background:#1C1917;width:0}

/* Chapter list — full-width rows, click-to-expand accordion (one open at a
   time; opening the next chapter closes whichever was open). No separate
   chapter page anymore, so the whole header is the toggle target. */
.chapter-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.ch-row{background:#fff;border:1px solid rgba(0,0,0,.07);transition:box-shadow .12s}
.ch-row:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.ch-row-header{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer}
.ch-row-num{font-size:12px;font-weight:600;color:#97948E;width:18px;flex-shrink:0}
.ch-row-icon{width:38px;height:38px;border-radius:9px;background:#F5F0E8;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ch-row-name{font-family:'Athletics';font-size:14px;font-weight:700;color:#1C1917;flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.ch-row-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-row-progress-track{width:60px;height:4px;border-radius:2px;background:#E5DDD4;overflow:hidden;display:block}
.ch-row-progress-fill{height:100%;background:#1C1917;display:block}
.ch-row-count{font-size:11px;color:#97948E;white-space:nowrap}
.ch-row-done-badge{width:18px;height:18px;border-radius:50%;background:#3B9E6B;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-row-done-badge svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.ch-row-chevron{font-size:11px;color:#97948E;transition:transform .15s ease;flex-shrink:0}
.ch-row.open .ch-row-chevron{transform:rotate(180deg);color:#1C1917}
/* Expand wrapper — grid-template-rows 0fr→1fr, pushes content below down (normal flow, not overlay) */
.ch-row-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease}
.ch-row.open .ch-row-body{grid-template-rows:1fr}
.ch-row-body-inner{overflow:hidden}
.ch-row-lessons{padding:2px 16px 6px 68px;border-top:1px solid #F5F0E8;margin-top:2px}

/* Lesson rows with real Start/Resume/Review state — ported from the retired
   chapter page (maths-grade-3-chapter.html), generalized with a chIdx
   parameter since every chapter's lessons now render on this one page. */
.lesson-row{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid rgba(0,0,0,.06);position:relative}
.lesson-row:last-child{border-bottom:none}
.lr-num-wrap{width:32px;height:32px;border-radius:50%;background:#C2E0CE;border:1.5px solid #A0CEBB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#2D6B4F;flex-shrink:0;position:relative}
.lr-num-wrap.done{background:#2D6B4F;border-color:#2D6B4F}
.lr-num-wrap.done .lr-num{display:none}
.lr-num-wrap.done::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700}
.lr-num-wrap.resume-circle{background:#fff;border:2px solid #F4AB52}
.lr-num-wrap.resume-circle .lr-num{color:#CE7E12}
.lr-num-wrap.locked{background:#E5DDD4;border-color:#D5CFC9;opacity:.6}
.lr-num-wrap.locked .lr-num{display:none}
.lr-num-wrap.locked::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.lr-info{flex:1;min-width:0}
.lr-eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#2D6B4F;margin-bottom:3px;display:block}
.lr-name{font-size:12.5px;font-weight:500;color:#1C1917;line-height:1.35}
.lr-name.muted{color:#B0C4BB}
.lr-mastery{font-size:10.5px;color:#F4AB52;display:flex;align-items:center;gap:4px;margin-top:3px}
.lr-mastery-dot{width:6px;height:6px;border-radius:50%;background:#F4AB52;flex-shrink:0}
.lr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.lr-btn{flex-shrink:0;border:1.5px solid #1C1917;padding:6px 14px;font-family:'UntitledSans';font-size:10.5px;font-weight:600;cursor:pointer;background:none;color:#1C1917;letter-spacing:.05em;white-space:nowrap;min-width:68px;text-align:center}
.lr-btn:hover{background:#1C1917;color:#fff}
.lr-btn.review{border-color:#A0CEBB;color:#2D6B4F;background:none}
.lr-btn.review:hover{background:#2D6B4F;color:#fff;border-color:#2D6B4F}
.lr-btn.resume{background:#1C1917;color:#fff;border-color:#1C1917}
.lr-btn.resume:hover{background:#333}
.lr-btn.signin{background:#F4AB52;color:#1C1917;border-color:#F4AB52;font-size:10px;padding:6px 10px;min-width:auto}
.lr-btn.signin:hover{background:#E89040;border-color:#E89040}
.lr-menu{background:none;border:none;cursor:pointer;color:#B0C4BB;padding:4px 6px;font-size:17px;flex-shrink:0;position:relative;line-height:1}
.lr-menu:hover{color:#2D6B4F}
.lr-dropdown{position:absolute;right:0;top:100%;background:#fff;border:1px solid rgba(0,0,0,.1);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:20;min-width:140px;display:none}
.lr-dropdown.open{display:block}
.lr-dd-item{padding:10px 16px;font-size:13px;cursor:pointer;color:#1C1917}
.lr-dd-item:hover{background:#EDF7F2}
.locked-row{opacity:.7}

/* Lesson-preview + sign-in modals — ported from the retired chapter page */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;width:400px;max-width:90vw;padding:28px 28px 24px;position:relative}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#97948E;line-height:1}
.modal-close:hover{color:#1C1917}
.modal-lesson-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:#97948E;margin-bottom:8px}
.modal-title{font-family:'Athletics';font-size:20px;font-weight:700;color:#1C1917;line-height:1.25;margin-bottom:14px}
.modal-tags{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.modal-tag{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid rgba(0,0,0,.12);font-size:12px;font-weight:500;color:#1C1917;background:#FAFAF8}
.modal-skills-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#97948E;margin-bottom:10px}
.modal-skill{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #F5F0E8;font-size:13px;color:#1C1917;line-height:1.35}
.modal-skill:last-of-type{border-bottom:none}
.modal-skill-arrow{color:#F4AB52;font-size:14px;flex-shrink:0;margin-top:0}
.modal-continue{display:block;width:100%;margin-top:20px;background:#1C1917;color:#fff;border:none;padding:14px;font-family:'UntitledSans';font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.06em}
.modal-continue:hover{background:#333}

/* App download CTA — ported from maths.html, same component/colors */
.app-download-strip{background:#1C1917;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.app-dl-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.app-dl-icon{font-size:24px;flex-shrink:0}
.app-dl-title{font-family:'Athletics';font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.app-dl-sub{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4}
.app-dl-btns{display:flex;gap:8px;flex-shrink:0}
.app-dl-btn{display:flex;align-items:center;gap:5px;background:#F4AB52;color:#1C1917;padding:7px 14px;font-family:'UntitledSans';font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap}
.app-dl-btn:hover{background:#CE7E12;color:#fff}

/* RIGHT PANEL */
.rightpanel{background:#F5F0E8;border-left:1px solid rgba(0,0,0,.08);overflow-y:auto}
.rp-inner{padding:14px;display:flex;flex-direction:column;gap:10px}
.rp-stats-row{display:flex;background:#fff;border:1px solid rgba(0,0,0,.07)}
.rp-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;border-right:1px solid rgba(0,0,0,.06)}
.rp-stat:last-child{border-right:none}
.rp-stat-icon{width:30px;height:30px;border-radius:50%;background:#F5F0E8;display:flex;align-items:center;justify-content:center}
.rp-stat-icon svg{width:15px;height:15px}
.rp-stat-points{color:#7C3AED}
.rp-stat-streak{color:#16A34A}
.rp-stat-sparks{color:#E89040}
.rp-stat-label{font-size:9px;color:#97948E;text-transform:uppercase;letter-spacing:.05em}
.rp-stat-value{font-family:'Athletics';font-size:14px;font-weight:700;color:#1C1917}
.rp-cta-inner{background:linear-gradient(135deg,#EC9A32 0%,#F6BE7C 50%,#D994F8 100%);padding:16px}
.rp-cta-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#7E4800;margin-bottom:5px;display:block}
.rp-cta-title{font-family:'Athletics';font-size:15px;font-weight:700;color:#292827;margin-bottom:4px;line-height:1.3}
.rp-cta-sub{font-size:11px;color:#5B4100;margin-bottom:12px;line-height:1.5}
.rp-cta-btn{background:#1C1917;color:#fff;border:none;padding:9px;font-family:'UntitledSans';font-size:12px;font-weight:500;cursor:pointer;width:100%}
.rp-cta-appbtn{display:flex;align-items:center;justify-content:center;gap:6px;background:#1C1917;color:#fff;border:none;padding:9px;font-family:'UntitledSans';font-size:12px;font-weight:500;cursor:pointer;text-decoration:none}
.rp-cta-appbtn:hover{background:#333;color:#fff}
.rp-divider{height:1px;background:rgba(0,0,0,.07)}
.rp-resources-nav{background:#fff;border:1px solid rgba(0,0,0,.07)}
.rrn-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#97948E;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.07)}
.rrn-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(0,0,0,.05);font-size:12px;color:#1C1917;cursor:pointer;text-decoration:none}
.rrn-item:hover{background:#FAF1E6;color:#CE7E12}
.rrn-item:last-child{border-bottom:none}
.rrn-icon{font-size:14px;flex-shrink:0}

/* MOBILE — reflow the sidebar below the main content instead of hiding it
   (it's where the stats, app CTAs, and resources nav live — hiding it meant
   most visitors, who are on mobile, never saw a single CTA on this page). */
@media(max-width:768px){
  html,body{height:auto;overflow:visible}
  .shell{display:block;height:auto}
  .leftnav{display:none}
  .main{overflow-y:visible}
  .rightpanel{overflow-y:visible;border-left:none;border-top:1px solid rgba(0,0,0,.08)}
}
@media(max-width:480px){
  .grade-wrap{padding:14px}
  .ch-row-header{flex-wrap:wrap;gap:8px 10px}
  .ch-row-meta{order:3;width:100%;padding-left:52px}
  .rp-inner{padding:12px}
  .lesson-row{flex-wrap:wrap}
  .lr-actions{margin-left:46px}
}
</style>
</head>
<body>
<div class="shell">
  <nav class="leftnav">
    <div class="ln-avatar">😊</div>
    <div class="ln-items">
      <div class="ln-item active">
        <div class="ln-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <span class="ln-label">School</span>
      </div>
      <div class="ln-item">
        <div class="ln-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
        <span class="ln-label">Test</span>
      </div>
      <div class="ln-item">
        <div class="ln-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>
        <span class="ln-label">Enrich</span>

  <div class="main">

      <div class="topbar-bc">
        <a href="maths.html">Maths</a><span>›</span>
        <span class="cur" id="bc-grade-label">Grade 3</span>
      </div>
    </div>
    <div class="grade-wrap">
      <div class="grade-switcher">
        <button class="gs-pill" data-grade="K" onclick="loadGrade('K')">K</button>
        <button class="gs-pill" data-grade="1" onclick="loadGrade(1)">Grade 1</button>
        <button class="gs-pill" data-grade="2" onclick="loadGrade(2)">Grade 2</button>
        <button class="gs-pill active" data-grade="3" onclick="loadGrade(3)">Grade 3</button>
        <button class="gs-pill" data-grade="4" onclick="loadGrade(4)">Grade 4</button>
        <button class="gs-pill" data-grade="5" onclick="loadGrade(5)">Grade 5</button>
        <button class="gs-pill" data-grade="6" onclick="loadGrade(6)">Grade 6</button>
        <button class="gs-pill" data-grade="7" onclick="loadGrade(7)">Grade 7</button>
        <button class="gs-pill" data-grade="8" onclick="loadGrade(8)">Grade 8</button>
      </div>
      <div class="grade-section-header">
        <span style="font-size:18px">📓</span>
        <span class="grade-section-title">USCC · Grade 3</span>

      <div class="mastery-track"><div class="mastery-fill"></div></div>
      <div class="chapter-list" id="chapter-grid"></div>

    </div>
  </div>

  <div class="rightpanel">
    <div class="rp-inner">
      <div class="rp-stats-row">
        <div class="rp-stat">
          <div class="rp-stat-icon rp-stat-points"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          <div class="rp-stat-label">Points</div>
          <div class="rp-stat-value" id="rp-points-value">0</div>

        <div class="rp-stat">

          <div class="rp-stat-label">Streak</div>
          <div class="rp-stat-value" id="rp-streak-value">0</div>
        </div>
        <div class="rp-stat">
          <div class="rp-stat-icon rp-stat-sparks"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div>

      <div class="rp-cta-inner">

        <div class="rp-cta-title">Unlock unlimited practice</div>

      <div class="rp-resources-nav">
        <div class="rrn-title">Resources</div>
        <a href="#" class="rrn-item" onclick="event.preventDefault()"><span class="rrn-icon">📄</span>Worksheets</a>

        <a href="https://www.cuemath.com/calculators/" target="_blank" rel="noopener" class="rrn-item"><span class="rrn-icon">🧮</span>Calculators</a>
        <a href="https://www.cuemath.com/math-formulas/" target="_blank" rel="noopener" class="rrn-item"><span class="rrn-icon">📐</span>Formulas</a>
      </div>
    </div>
  </div>
</div>

<!-- LESSON PREVIEW MODAL — ported from the retired chapter page -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-lesson-label" id="modal-label">LESSON 1</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-tags">
      <span class="modal-tag">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Medium
      </span>
      <span class="modal-tag">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        Learn
      </span>
    </div>
    <div class="modal-skills-label">Skills covered</div>
    <div id="modal-skills"></div>
    <button class="modal-continue" id="modal-continue-btn" onclick="goToLesson()">CONTINUE</button>
  </div>
</div>

<script src="gamification.js"></script>
<script src="curriculum-data.js"></script>
<script>
// csvGradeData comes from curriculum-data.js (shared, real K-7 xlsx data).
// gamification.js renders Points/Streak/Sparks on load.
//
// State logic (getGlobalCompleted/getState/markComplete/goToReview/
// goToResume/openLessonModal/sign-in modal) is ported from the retired
// chapter page (maths-grade-3-chapter.html) and generalized with a chIdx
// parameter, since this page shows every chapter's lessons at once instead
// of one chapter per page. There is no separate chapter page anymore — the
// chapter row's header now toggles the inline lesson list (click, one open
// at a time) instead of navigating anywhere, and Start/Resume/Review go
// straight to the lesson page.

const gradeLabels = {'K':'USCC · Kindergarten',1:'USCC · Grade 1',2:'USCC · Grade 2',3:'USCC · Grade 3',4:'USCC · Grade 4',5:'USCC · Grade 5',6:'USCC · Grade 6',7:'USCC · Grade 7',8:'USCC · Grade 8'};

let currentGrade = 3;
let isSignedIn = sessionStorage.getItem('cuemathSignedIn') === '1';
const GLOBAL_COMPLETE_KEY = 'cuemathGlobalCompletedLesson';

function getGlobalCompleted(){
  const raw = sessionStorage.getItem(GLOBAL_COMPLETE_KEY);
  return raw ? JSON.parse(raw) : null;
}
function setGlobalManuallyCompleted(g, c, l){
  sessionStorage.setItem(GLOBAL_COMPLETE_KEY, JSON.stringify({grade: g, ch: c, lesson: l, practiceDone: true, manuallyCompleted: true}));
}

// Pure per-lesson state check — reads global claim fresh each call rather
// than caching arrays, since this page has to compute state for every
// lesson across every chapter, not just one chapter's worth.
function getState(chIdx, i, globalCompleted){
  const isClaimed = globalCompleted && globalCompleted.grade === currentGrade && globalCompleted.ch === chIdx && globalCompleted.lesson === i;
  if (isClaimed && (globalCompleted.practiceDone || globalCompleted.manuallyCompleted)) return 'done';
  if (isClaimed) return 'resume';
  if (isSignedIn) return 'start';
  if (globalCompleted === null) return 'start'; // nobody's started a lesson anywhere yet — all open
  return 'locked'; // the one free lesson's been used, here or elsewhere — lock the rest
}

function buildLessonRows(chIdx, lessons){
  const globalCompleted = getGlobalCompleted();
  return lessons.map((name, i) => {
    const num = i + 1;
    const state = getState(chIdx, i, globalCompleted);
    const isLocked = state === 'locked';

    let circleClass = 'lr-num-wrap';
    if(state === 'done') circleClass += ' done';
    else if(state === 'resume') circleClass += ' resume-circle';
    else if(isLocked) circleClass += ' locked';

    const eyebrow = state === 'done' ? `<span class="lr-eyebrow">REVIEW</span>`
      : state === 'resume' ? `<span class="lr-eyebrow" style="color:#CE7E12">IN PROGRESS</span>` : '';

    let mastery = '';
    if(state === 'done') mastery = `<div class="lr-mastery"><div class="lr-mastery-dot"></div>100% Mastered</div>`;
    else if(state === 'resume') mastery = `<div class="lr-mastery" style="opacity:.7"><div class="lr-mastery-dot" style="background:#F4AB52"></div>Practice not finished yet</div>`;
    else if(state === 'start') mastery = `<div class="lr-mastery" style="opacity:.4"><div class="lr-mastery-dot" style="background:#B0AAA5"></div>0% Mastered</div>`;

    const safeN = name.replace(/'/g, "\\'");
    let btnHtml = '';
    if(state === 'done'){
      btnHtml = `<button class="lr-btn review" onclick="goToReview(${chIdx},${num},event)">REVIEW</button>`;
    } else if(state === 'resume'){
      btnHtml = `<button class="lr-btn resume" onclick="goToResume(${chIdx},${num},event)">RESUME</button>`;
    } else if(state === 'start'){
      btnHtml = `<button class="lr-btn" onclick="openLessonModal(${chIdx},${num},'${safeN}',event)">START</button>`;
    } else {
      btnHtml = isSignedIn ? '' : `<a class="lr-btn signin" href="https://student.cuemath.com/">Sign Up</a>`;
    }

    const menuHtml = (state === 'start' || state === 'resume')
      ? `<button class="lr-menu" onclick="toggleDD('dd-${chIdx}-${i}',event)">⋯<div class="lr-dropdown" id="dd-${chIdx}-${i}"><div class="lr-dd-item" onclick="markComplete(${chIdx},${i},event)">Mark as Complete</div></div></button>`
      : '';

    return `<div class="lesson-row${isLocked ? ' locked-row' : ''}">
      <div class="${circleClass}"><span class="lr-num">${num}</span></div>
      <div class="lr-info">
        ${eyebrow}
        <div class="lr-name${isLocked ? ' muted' : ''}">${name}</div>
        ${mastery}
      </div>
      <div class="lr-actions">${btnHtml}${menuHtml}</div>
    </div>`;
  }).join('');
}

function markComplete(chIdx, i, e){
  if(e) e.stopPropagation();
  setGlobalManuallyCompleted(currentGrade, chIdx, i);
  cmAwardManualCompletePoints(`${currentGrade}-${chIdx}-${i}`);
  loadGrade(currentGrade); // full re-render — signing/completing affects every chapter's lock state
}

function goToReview(chIdx, num, e){
  if(e) e.stopPropagation();
  location.href = 'maths-grade-3-lesson.html?grade=' + currentGrade + '&ch=' + (chIdx + 1) + '&lesson=' + num + '&tab=practice';
}
function goToResume(chIdx, num, e){
  if(e) e.stopPropagation();
  location.href = 'maths-grade-3-lesson.html?grade=' + currentGrade + '&ch=' + (chIdx + 1) + '&lesson=' + num + '&tab=practice';
}

let openDD = null;
function toggleDD(id, e){
  e.stopPropagation();
  if(openDD && openDD !== id){ document.getElementById(openDD)?.classList.remove('open'); }
  const el = document.getElementById(id);
  if(el){ el.classList.toggle('open'); openDD = el.classList.contains('open') ? id : null; }
}
document.addEventListener('click', () => {
  if(openDD){ document.getElementById(openDD)?.classList.remove('open'); openDD = null; }
});

let currentModalChIdx = 0;
let currentModalLessonNum = 1;
function openLessonModal(chIdx, num, name, e){
  if(e) e.stopPropagation();
  currentModalChIdx = chIdx;
  currentModalLessonNum = num;
  document.getElementById('modal-label').textContent = 'LESSON ' + num;
  document.getElementById('modal-title').textContent = name;
  const chLessons = csvGradeData[currentGrade][chIdx].lessons;
  const startIdx = chLessons.indexOf(name);
  const skills = chLessons.slice(Math.max(0, startIdx), Math.max(0, startIdx) + 5);
  document.getElementById('modal-skills').innerHTML = skills.map(s =>
    `<div class="modal-skill"><span class="modal-skill-arrow">›</span>${s}</div>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}
function goToLesson(){
  location.href = 'maths-grade-3-lesson.html?grade=' + currentGrade + '&ch=' + (currentModalChIdx + 1) + '&lesson=' + currentModalLessonNum;
}
document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

let openChapterIdx = null;

function toggleChapter(i){
  const wasOpen = openChapterIdx === i;
  document.querySelectorAll('.ch-row.open').forEach(r => r.classList.remove('open'));
  openChapterIdx = wasOpen ? null : i;
  if(!wasOpen) document.getElementById('ch-'+(i+1)).classList.add('open');
}

function loadGrade(g){
  if(g !== currentGrade) openChapterIdx = null;
  currentGrade = g;
  const chapters = csvGradeData[g];
  if(!chapters) return;
  const gradeName = g==='K' ? 'Kindergarten' : 'Grade '+g;
  document.querySelector('.grade-section-title').textContent = gradeLabels[g] || ('USCC · '+gradeName);
  document.getElementById('bc-grade-label').textContent = gradeName;
  document.querySelectorAll('.gs-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.grade == g);
  });

  const globalCompleted = getGlobalCompleted();
  const grid = document.getElementById('chapter-grid');
  grid.innerHTML = chapters.map((ch, i) => {
    const lessons = ch.lessons;
    const pct = (globalCompleted && globalCompleted.grade === g && globalCompleted.ch === i) ? (1 / lessons.length) : 0;
    const isDone = globalCompleted && globalCompleted.grade === g && globalCompleted.ch === i && (globalCompleted.practiceDone || globalCompleted.manuallyCompleted);
    const lessonRows = buildLessonRows(i, lessons);
    return `
    <div class="ch-row" id="ch-${i+1}">
      <div class="ch-row-header" onclick="toggleChapter(${i})">
        <span class="ch-row-num">${i+1}</span>
        <span class="ch-row-icon">${ch.emoji || '📘'}</span>
        <span class="ch-row-name">${ch.name}</span>
        <span class="ch-row-meta">
          <span class="ch-row-progress-track"><span class="ch-row-progress-fill" style="width:${Math.round(pct*100)}%"></span></span>
          <span class="ch-row-count">${lessons.length} lesson${lessons.length===1?'':'s'}</span>
          ${isDone ? `<span class="ch-row-done-badge"><svg viewBox="0 0 16 16"><polyline points="2,9 6,13 14,4"/></svg></span>` : ''}
        </span>
        <span class="ch-row-chevron">⌄</span>
      </div>
      <div class="ch-row-body">
        <div class="ch-row-body-inner">
          <div class="ch-row-lessons">${lessonRows}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  if(openChapterIdx !== null){
    const row = document.getElementById('ch-'+(openChapterIdx+1));
    if(row) row.classList.add('open');
  }
}

const _initParams = new URLSearchParams(location.search);
const _initGradeParam = _initParams.get('grade');
const _initGrade = _initGradeParam === 'K' ? 'K' : (parseInt(_initGradeParam) || 3);
loadGrade(_initGrade);

// Deep-link support — e.g. maths.html's By Grade tab or maths-topic.html's
// "Go to chapter" button link straight to a chapter here (grade + ch),
// since there's no separate chapter page to land on anymore. Opens that
// chapter already expanded and scrolls it into view.
const _initCh = parseInt(_initParams.get('ch'));
if (_initCh) {
  const chRow = document.getElementById('ch-' + _initCh);
  if (chRow) {
    toggleChapter(_initCh - 1);
    chRow.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}
</script>
</body>
</html>
